name: CI/CD Pipeline to Multipass

on:
  push:
    branches:
      - main # main branch'ga kod tushganda ishlaydi

jobs:
  build-and-deploy:
    runs-on: self-hosted # DIQQAT! Bu sening Multipass serveringda ishlashini bildiradi.

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests # JAR fayl yaratamiz

      - name: Build Docker Image
        run: docker build -t my-spring-app .

      - name: Deploy Container
        run: |
          # Agar eski konteyner ishlab turgan bo'lsa, o'chiramiz (downtime bilan sodda usul)
          docker rm -f my-app-container || true
          # Yangi konteynerni 8080 portda ishga tushiramiz
          docker run -d -p 8080:8080 --name my-app-container my-spring-app