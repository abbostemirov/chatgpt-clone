name: CI/CD Pipeline to Multipass

on:
  push:
    branches:
      - main

# GitHub'ga Image yuklash uchun ruxsat beramiz
permissions:
  contents: read
  packages: write

jobs:
  # 1-VAZIFA: Bulutda ishlaydi (GitHub serverlarida)
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Repository nomini avtomat kichik harfga o'tkazish
      - name: Lowercase Repository Name
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO }}/spring-app:latest

  # 2-VAZIFA: Sening Multipass serveringda ishlaydi
  deploy:
    needs: build-and-push # Faqat 1-vazifa tuggandan keyin ishlaydi
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to GHCR on Server
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Deploy with Zero-Downtime
        run: |
            chmod +x deploy.sh # Skriptga ishga tushish huquqini beramiz
            ./deploy.sh